
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>吸血鬼资本家 - 战斗样片</title>
  <style>
    :root {
      --panel: #181e28;
      --panel-edge: #2f3949;
      --text: #e8edf5;
      --sub: #9da8bd;
      --accent: #f1bf6f;
      --bg1: #0a1320;
      --bg2: #17263a;
      --focus-top: 36%;
      --focus-bottom: 64%;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, #243a52 0%, transparent 40%),
        radial-gradient(circle at 82% 82%, #2d2742 0%, transparent 45%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(1160px, 100%);
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr 330px;
      align-items: start;
    }

    .viewer {
      background: #0b111a;
      border: 1px solid #2b3443;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.38);
    }

    .viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #0c1218;
      border: 1px solid #283446;
      border-radius: 10px;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #blurTop,
    #blurBottom {
      opacity: 0.78;
      pointer-events: none;
    }

    #blurTop {
      -webkit-mask-image: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.95) 0%,
        rgba(0, 0, 0, 0.9) 18%,
        rgba(0, 0, 0, 0) var(--focus-top)
      );
      mask-image: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.95) 0%,
        rgba(0, 0, 0, 0.9) 18%,
        rgba(0, 0, 0, 0) var(--focus-top)
      );
    }

    #blurBottom {
      -webkit-mask-image: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.95) 0%,
        rgba(0, 0, 0, 0.9) 18%,
        rgba(0, 0, 0, 0) calc(100% - var(--focus-bottom))
      );
      mask-image: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.95) 0%,
        rgba(0, 0, 0, 0.9) 18%,
        rgba(0, 0, 0, 0) calc(100% - var(--focus-bottom))
      );
    }

    .hud-exp {
      position: absolute;
      top: 8px;
      left: 10px;
      right: 10px;
      display: grid;
      grid-template-columns: 52px 1fr 58px;
      gap: 6px;
      align-items: center;
      z-index: 6;
      pointer-events: none;
    }

    .hud-exp .level,
    .hud-exp .value {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.65);
    }

    .hud-exp .level { color: #d6e2f6; font-weight: 700; }
    .hud-exp .value { color: #f7dfa8; text-align: right; }

    .hud-exp .track {
      height: 9px;
      border: 1px solid #0f1724;
      background: rgba(20, 30, 46, 0.9);
      border-radius: 6px;
      overflow: hidden;
    }

    .hud-exp .fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #f6b95c, #ffe6a3);
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.25);
    }

    .hud-ammo {
      position: absolute;
      left: 10px;
      bottom: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(10, 15, 24, 0.82);
      border: 1px solid rgba(136, 157, 190, 0.45);
      border-radius: 6px;
      padding: 4px 7px;
      z-index: 6;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    .hud-ammo svg { width: 16px; height: 16px; display: block; }
    .hud-ammo .ammo-cur { font-size: 13px; color: #f9e9be; font-weight: 700; min-width: 18px; text-align: right; }
    
    .hud-hp {
      position: absolute;
      left: 10px;
      bottom: 40px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(10, 15, 24, 0.82);
      border: 1px solid rgba(180, 82, 90, 0.58);
      border-radius: 6px;
      padding: 3px 7px;
      z-index: 6;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    .hud-hp .hp-filled { font-size: 12px; color: #ef5d63; letter-spacing: 1px; }
    .hud-hp .hp-empty { font-size: 12px; color: #6b7386; letter-spacing: 1px; }
    .hud-hp .hp-val { font-size: 11px; color: #f3d6d8; }

    .tag {
      margin-top: 12px;
      font-size: 13px;
      color: var(--sub);
      letter-spacing: 0.2px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-edge);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
    }

    h1 { margin: 0 0 8px; font-size: 18px; color: #f7f9fc; }
    p { margin: 0 0 14px; font-size: 13px; line-height: 1.55; color: var(--sub); }
    .ctrl { margin-bottom: 12px; }

    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
      color: #c7d0e0;
    }

    input[type="range"] { width: 100%; accent-color: var(--accent); }

    .value {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      margin-left: 8px;
      min-width: 56px;
      text-align: right;
    }

    .pill {
      display: inline-block;
      margin: 4px 6px 0 0;
      font-size: 11px;
      color: #0f1724;
      background: #8ab6f4;
      border-radius: 999px;
      padding: 3px 9px;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="viewer">
      <div class="viewport" id="viewport">
        <canvas id="base" width="426" height="240"></canvas>
        <canvas id="blurTop" width="426" height="240"></canvas>
        <canvas id="blurBottom" width="426" height="240"></canvas>

        <div class="hud-exp">
          <span class="level" id="levelHud">Lv.1</span>
          <div class="track"><div class="fill" id="expFill"></div></div>
          <span class="value" id="expHudVal">0/5</span>
        </div>
        <div class="hud-hp" id="hpHud">
          <span class="hp-filled" id="hpFilled">♥♥♥♥♥♥♥♥♥♥</span>
          <span class="hp-empty" id="hpEmpty"></span>
          <span class="hp-val" id="hpVal">100/100</span>
        </div>
        <div class="hud-ammo">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <rect x="1" y="6" width="8" height="4" fill="#d2d8e6"></rect>
            <rect x="9" y="7" width="4" height="2" fill="#f2c26b"></rect>
            <rect x="5" y="10" width="3" height="4" fill="#9ca8bc"></rect>
            <rect x="6" y="12" width="4" height="2" fill="#79869d"></rect>
          </svg>
          <span class="ammo-cur" id="ammoHudVal">12</span>
          <span class="ammo-max">/12</span>
        </div>
      </div>
      <div class="tag">W/A/S/D 移动，鼠标左键开火（0.5秒CD）。5只哥布林、受击冲击波击退、宝珠吸附经验、升级光效与音效。</div>
    </section>

    <aside class="panel">
      <h1>战斗样片</h1>
      <p>空弹或 2 秒未开火会自动换弹（2秒）。击杀掉落宝珠，10 像素内吸附到主角并获得经验。</p>

      <div class="ctrl"><label>移轴模糊强度<span class="value" id="blurVal">2.0px</span></label><input id="blurRange" type="range" min="0" max="5" step="0.1" value="2.0" /></div>
      <div class="ctrl"><label>焦平面上边界<span class="value" id="topVal">36%</span></label><input id="topRange" type="range" min="20" max="48" step="1" value="36" /></div>
      <div class="ctrl"><label>焦平面下边界<span class="value" id="bottomVal">64%</span></label><input id="bottomRange" type="range" min="52" max="84" step="1" value="64" /></div>
      <div class="ctrl"><label>主角坐标<span class="value" id="coordVal">0,0</span></label></div>
      <div class="ctrl"><label>碰撞状态<span class="value" id="contactVal">分离</span></label></div>
      <div class="ctrl"><label>最近伤害<span class="value" id="damageVal">-</span></label></div>
      <div class="ctrl"><label>小怪存活<span class="value" id="goblinCountVal">5/5</span></label></div>
      <div class="ctrl"><label>当前弹药<span class="value" id="ammoVal">12/12</span></label></div>
      <div class="ctrl"><label>武器状态<span class="value" id="reloadVal">待机</span></label></div>
      <div class="ctrl"><label>等级进度<span class="value" id="levelPanelVal">Lv.1 0/5</span></label></div>
      <div class="ctrl"><label>弹射时间(ms)<span class="value" id="knockbackDurationVal">320</span></label></div>
      <div class="ctrl"><label>弹射距离(px)<span class="value" id="knockbackDistanceVal">100</span></label></div>

      <span class="pill">0.5秒CD</span><span class="pill">5小怪</span><span class="pill">宝珠吸附</span><span class="pill">Lv100</span>
    </aside>
  </main>
  <script src="code/threads/thread_B/00_core.js"></script>
  <script src="code/threads/thread_B/05_heroes.js"></script>
  <script src="code/threads/thread_B/10_world.js"></script>
  <script src="code/threads/thread_B/20_systems.js"></script>
</body>
</html>
