<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>吸血鬼资本家 - 3D片头模式</title>
  <style>
    :root {
      --bg-a: #070d15;
      --bg-b: #151c2a;
      --panel: rgba(14, 20, 30, 0.8);
      --edge: rgba(140, 154, 181, 0.35);
      --text: #eef3ff;
      --sub: #9fb0cd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 18%, #2c3e59 0%, transparent 42%),
        radial-gradient(circle at 85% 78%, #3b2432 0%, transparent 44%),
        linear-gradient(160deg, var(--bg-a), var(--bg-b));
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      padding: 22px;
    }

    .wrap {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 1fr 248px;
      gap: 12px;
      align-items: start;
    }

    .viewer {
      background: #090f17;
      border: 1px solid #273244;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 22px 44px rgba(0, 0, 0, 0.4);
    }

    .viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid #253145;
      border-radius: 10px;
      overflow: hidden;
      background: #0a0f16;
      cursor: crosshair;
      user-select: none;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .tag {
      position: absolute;
      top: 9px;
      left: 9px;
      font-size: 10px;
      z-index: 4;
      color: #f8e4bb;
      border: 1px solid rgba(252, 214, 132, 0.52);
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(10, 15, 24, 0.72);
      pointer-events: none;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 4;
      color: #fff2d9;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.75);
      opacity: 0;
      transition: opacity 220ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .hint.show {
      opacity: 1;
    }

    .panel {
      border: 1px solid var(--edge);
      border-radius: 12px;
      background: var(--panel);
      padding: 12px;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.32);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 15px;
      color: #f5f8ff;
    }

    p {
      margin: 0 0 10px;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.55;
    }

    .pill {
      display: inline-block;
      margin: 4px 5px 0 0;
      background: #87b5f1;
      color: #0f1725;
      font-size: 10px;
      padding: 3px 7px;
      border-radius: 999px;
      font-weight: 600;
    }

    .pill.hot {
      background: #f4b35f;
    }

    .pill.blood {
      background: #df737d;
    }

    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="viewer">
      <div class="viewport" id="viewport">
        <canvas id="scene" width="426" height="240"></canvas>
        <div class="tag" id="tag">独立片头文件 · 3D冲击版</div>
        <div class="hint" id="hint">点击任意位置开始游戏</div>
      </div>
    </section>

    <aside class="panel">
      <h1>片头强化点</h1>
      <p>太阳和血月保持在左上高压构图，角色位于右下背身朝左上。枪击后使用“几大块玻璃”式碎裂，而不是细密裂纹。</p>
      <p>当前版本为6角色写实反光：按碎片面积映射到6块玻璃中，保留每个角色的人物特征与面部可见性。</p>

      <span class="pill hot">左上超大天体</span>
      <span class="pill blood">血月压迫</span>
      <span class="pill">右下背身主角</span>
      <span class="pill">几大块碎片</span>
      <span class="pill">镜面黑影</span>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const viewport = document.getElementById("viewport");
    const hint = document.getElementById("hint");
    const tag = document.getElementById("tag");

    const W = canvas.width;
    const H = canvas.height;
    const IMPACT_CENTER = { x: 186, y: 92 };

    ctx.imageSmoothingEnabled = false;

    const state = {
      phase: "cinematic",
      startAt: performance.now(),
      shotAt: null,
      readyAt: null,
      enterAt: null,
      twilight: 0,
      crack: 0,
      shakeUntil: 0,
      mouseX: W * 0.5,
      mouseY: H * 0.5,
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function mixHex(a, b, t) {
      const n = clamp(t, 0, 1);
      const A = a.replace("#", "");
      const B = b.replace("#", "");
      const ar = parseInt(A.slice(0, 2), 16);
      const ag = parseInt(A.slice(2, 4), 16);
      const ab = parseInt(A.slice(4, 6), 16);
      const br = parseInt(B.slice(0, 2), 16);
      const bg = parseInt(B.slice(2, 4), 16);
      const bb = parseInt(B.slice(4, 6), 16);
      const r = Math.round(ar + (br - ar) * n).toString(16).padStart(2, "0");
      const g = Math.round(ag + (bg - ag) * n).toString(16).padStart(2, "0");
      const b2 = Math.round(ab + (bb - ab) * n).toString(16).padStart(2, "0");
      return `#${r}${g}${b2}`;
    }

    function px(x, y, w, h, c) {
      ctx.fillStyle = c;
      ctx.fillRect(Math.round(x), Math.round(y), Math.max(1, Math.round(w)), Math.max(1, Math.round(h)));
    }

    function drawLine(x0, y0, x1, y1, color, width = 1) {
      let sx0 = Math.round(x0);
      let sy0 = Math.round(y0);
      const sx1 = Math.round(x1);
      const sy1 = Math.round(y1);
      const dx = Math.abs(sx1 - sx0);
      const dy = Math.abs(sy1 - sy0);
      const stepx = sx0 < sx1 ? 1 : -1;
      const stepy = sy0 < sy1 ? 1 : -1;
      let err = dx - dy;

      while (true) {
        if (width > 1) {
          px(sx0 - 1, sy0 - 1, width, width, color);
        } else {
          px(sx0, sy0, 1, 1, color);
        }

        if (sx0 === sx1 && sy0 === sy1) break;

        const e2 = err * 2;
        if (e2 > -dy) {
          err -= dy;
          sx0 += stepx;
        }
        if (e2 < dx) {
          err += dx;
          sy0 += stepy;
        }
      }
    }

    function drawCircle(cx, cy, r, color) {
      const rr = Math.round(r);
      for (let y = -rr; y <= rr; y += 1) {
        const w = Math.floor(Math.sqrt(Math.max(0, rr * rr - y * y)));
        px(cx - w, cy + y, w * 2 + 1, 1, color);
      }
    }

    function perimeterPoint(t) {
      const n = ((t % 1) + 1) % 1;
      if (n < 0.25) {
        return { x: n / 0.25 * (W - 1), y: 0 };
      }
      if (n < 0.5) {
        return { x: W - 1, y: (n - 0.25) / 0.25 * (H - 1) };
      }
      if (n < 0.75) {
        return { x: (1 - (n - 0.5) / 0.25) * (W - 1), y: H - 1 };
      }
      return { x: 0, y: (1 - (n - 0.75) / 0.25) * (H - 1) };
    }

    function rayToBounds(center, angle) {
      const dx = Math.cos(angle);
      const dy = Math.sin(angle);
      let dist = Infinity;

      if (dx > 0.0001) dist = Math.min(dist, (W - 1 - center.x) / dx);
      else if (dx < -0.0001) dist = Math.min(dist, -center.x / dx);

      if (dy > 0.0001) dist = Math.min(dist, (H - 1 - center.y) / dy);
      else if (dy < -0.0001) dist = Math.min(dist, -center.y / dy);

      return {
        x: center.x + dx * dist,
        y: center.y + dy * dist,
        dx,
        dy,
        dist,
      };
    }

    function buildBalancedSpokeAngles(center, spokeCount) {
      const startAngle = Math.atan2(-center.y, -center.x) - 0.18;
      const samples = 720;
      const turns = Math.PI * 2;
      const weights = [];
      let total = 0;

      for (let i = 0; i < samples; i += 1) {
        const angle = startAngle + (i / samples) * turns;
        const nextAngle = startAngle + ((i + 1) / samples) * turns;
        const rayA = rayToBounds(center, angle);
        const rayB = rayToBounds(center, nextAngle);
        total += (rayA.dist * rayA.dist + rayB.dist * rayB.dist) * 0.5;
        weights.push(total);
      }

      const angles = [];
      for (let i = 0; i < spokeCount; i += 1) {
        const target = total * (i / spokeCount);
        let idx = 0;
        while (idx < weights.length && weights[idx] < target) idx += 1;

        const prev = idx > 0 ? weights[idx - 1] : 0;
        const span = Math.max(0.0001, weights[Math.min(idx, weights.length - 1)] - prev);
        const frac = clamp((target - prev) / span, 0, 1);
        angles.push(startAngle + ((idx + frac) / samples) * turns);
      }

      return angles;
    }

    function createGlassPattern(center) {
      const spokes = [];
      const seams = [];
      const pieces = [];
      const inner = [];
      const spokeCount = 6;
      const spokeAngles = buildBalancedSpokeAngles(center, spokeCount);

      for (let i = 0; i < spokeCount; i += 1) {
        const angle = spokeAngles[i] + Math.sin(i * 1.97) * 0.012;
        const edgeRay = rayToBounds(center, angle);
        const edge = { x: edgeRay.x, y: edgeRay.y };
        const dist = edgeRay.dist;
        const dirx = edgeRay.dx;
        const diry = edgeRay.dy;
        const nx = -diry;
        const ny = dirx;

        const bend = Math.sin(i * 2.35) * (5 + (i % 2) * 2);
        const midDist = dist * (0.54 + Math.cos(i * 1.43) * 0.016);
        const mid = {
          x: center.x + dirx * midDist + nx * bend,
          y: center.y + diry * midDist + ny * bend,
        };
        spokes.push([{ x: center.x, y: center.y }, mid, edge]);

        const innerR = 18 + Math.sin(i * 1.61) * 1.2;
        inner.push({
          x: center.x + dirx * innerR,
          y: center.y + diry * innerR,
        });
      }

      for (let i = 0; i < spokeCount; i += 1) {
        const next = (i + 1) % spokeCount;
        seams.push([inner[i], inner[next]]);
        seams.push([inner[i], spokes[i][1]]);
        if (i % 2 === 0) {
          seams.push([spokes[i][1], spokes[next][1]]);
        }

        pieces.push([
          inner[i],
          spokes[i][1],
          spokes[i][2],
          spokes[next][2],
          spokes[next][1],
          inner[next],
        ]);
      }

      return { spokes, seams, pieces };
    }

    const glassPattern = createGlassPattern(IMPACT_CENTER);

    function polygonArea(points) {
      let area = 0;
      for (let i = 0; i < points.length; i += 1) {
        const j = (i + 1) % points.length;
        area += points[i].x * points[j].y - points[j].x * points[i].y;
      }
      return Math.abs(area) * 0.5;
    }

    const shardOrder = glassPattern.pieces
      .map((piece, idx) => ({ idx, area: polygonArea(piece) }))
      .sort((a, b) => b.area - a.area);

    const shardRankByIdx = new Array(glassPattern.pieces.length).fill(-1);
    for (let i = 0; i < shardOrder.length; i += 1) {
      shardRankByIdx[shardOrder[i].idx] = i;
    }
    const skaterPosterSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 980">
      <g fill="none" fill-rule="evenodd">
        <path fill="#05070d" d="M102 940c-10-198 26-358 96-474 38-64 96-116 162-122 66 6 124 58 162 122 70 116 106 276 96 474H102z"/>
        <path fill="#05070d" d="M228 388c-72 48-124 136-150 244-18 74-22 194-20 308h96c2-120 12-220 44-300 22-56 54-98 104-126l-74-126z"/>
        <path fill="#05070d" d="M492 388c72 48 124 136 150 244 18 74 22 194 20 308h-96c-2-120-12-220-44-300-22-56-54-98-104-126l74-126z"/>
        <ellipse cx="360" cy="232" rx="102" ry="126" fill="#06090f"/>
        <path fill="#f6fcff" d="M280 238c22-38 58-52 96-46-8 42-30 78-76 98-18 8-38 6-54-6 8-20 18-34 34-46z"/>
        <path fill="#f6fcff" d="M440 238c-22-38-58-52-96-46 8 42 30 78 76 98 18 8 38 6 54-6-8-20-18-34-34-46z"/>
        <path fill="#ffffff" d="M360 436c34 0 58 26 58 60 0 18-6 38-14 54l-44 96-44-96c-8-16-14-36-14-54 0-34 24-60 58-60z"/>
        <path fill="#ffffff" d="M360 462h8c22 0 44 8 64 20l70 42-14 24-64-38c-16-10-34-16-52-16h-12v-32zm-8 0v32h-12c-18 0-36 6-52 16l-64 38-14-24 70-42c20-12 42-20 64-20h8z"/>
        <path fill="#ffffff" d="M360 520c14 0 26 10 26 24 0 10-6 20-14 28l-12 12-12-12c-8-8-14-18-14-28 0-14 12-24 26-24z"/>
      </g>
    </svg>`;
    const skaterPosterSrc = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(skaterPosterSvg)}`;


    const roleConfigs = [
      { key: "gunman", sources: ["art/hero/johney.png"], frameY: 0.0, frameH: 0.7, yBias: 0.12 },
      { key: "scientist", sources: ["art/hero/hojin.png"], frameY: 0.0, frameH: 0.74, yBias: -0.12 },
      { key: "skater", sources: [skaterPosterSrc], frameY: 0.0, frameH: 0.78, yBias: -0.2, xBias: 0.02 },
      { key: "octopus", sources: ["art/hero/zhangyu.png"], frameY: 0.0, frameH: 0.78, yBias: -0.08, xBias: 0.20 },
      { key: "demon", sources: ["art/hero/demon.png"], frameY: 0.0, frameH: 0.7, yBias: -0.3 },
      { key: "fan_girl", sources: ["art/hero/质子.png"], frameY: 0.0, frameH: 0.72, yBias: -0.28 },
    ];

    const rolePortraits = roleConfigs.map(() => ({ canvas: null, ready: false }));

    function processRolePortrait(sourceImg) {
      const sw = sourceImg.naturalWidth || sourceImg.width;
      const sh = sourceImg.naturalHeight || sourceImg.height;
      if (!(sw > 0 && sh > 0)) return null;

      const maxDim = 760;
      const ratio = Math.min(1, maxDim / Math.max(sw, sh));
      const iw = Math.max(140, Math.round(sw * ratio));
      const ih = Math.max(140, Math.round(sh * ratio));

      // 原图保底：抠图失败时直接返回，保证角色可见。
      const rawCanvas = document.createElement("canvas");
      rawCanvas.width = iw;
      rawCanvas.height = ih;
      const rctx = rawCanvas.getContext("2d");
      rctx.clearRect(0, 0, iw, ih);
      rctx.imageSmoothingEnabled = true;
      rctx.drawImage(sourceImg, 0, 0, iw, ih);

      const out = document.createElement("canvas");
      out.width = iw;
      out.height = ih;
      const pctx = out.getContext("2d");
      pctx.clearRect(0, 0, iw, ih);
      pctx.imageSmoothingEnabled = true;
      pctx.drawImage(sourceImg, 0, 0, iw, ih);

      try {
        const img = pctx.getImageData(0, 0, iw, ih);
        const d = img.data;

        // 边界均值背景估计
        let br = 0;
        let bg = 0;
        let bb = 0;
        let bc = 0;
        const stepX = Math.max(1, Math.floor(iw / 14));
        const stepY = Math.max(1, Math.floor(ih / 14));

        for (let x = 0; x < iw; x += stepX) {
          const i0 = x * 4;
          const i1 = ((ih - 1) * iw + x) * 4;
          br += d[i0] + d[i1];
          bg += d[i0 + 1] + d[i1 + 1];
          bb += d[i0 + 2] + d[i1 + 2];
          bc += 2;
        }
        for (let y = 0; y < ih; y += stepY) {
          const i0 = (y * iw) * 4;
          const i1 = (y * iw + (iw - 1)) * 4;
          br += d[i0] + d[i1];
          bg += d[i0 + 1] + d[i1 + 1];
          bb += d[i0 + 2] + d[i1 + 2];
          bc += 2;
        }

        br /= Math.max(1, bc);
        bg /= Math.max(1, bc);
        bb /= Math.max(1, bc);

        let minX = iw;
        let minY = ih;
        let maxX = -1;
        let maxY = -1;
        let fgCount = 0;

        for (let y = 0; y < ih; y += 1) {
          for (let x = 0; x < iw; x += 1) {
            const p = y * iw + x;
            const i = p * 4;
            const r = d[i];
            const g = d[i + 1];
            const b = d[i + 2];
            const a = d[i + 3];

            if (a < 14) {
              d[i + 3] = 0;
              continue;
            }

            const dr = r - br;
            const dg = g - bg;
            const db = b - bb;
            const dist = Math.sqrt(dr * dr + dg * dg + db * db);
            const sat = Math.max(r, g, b) - Math.min(r, g, b);
            const lum = 0.299 * r + 0.587 * g + 0.114 * b;

            const keepBg = clamp((dist - 16) / 76, 0, 1);
            const keepSat = clamp((sat - 8) / 88, 0, 1);
            const keepLum = clamp((165 - lum) / 240, 0, 1);
            const keep = Math.max(keepBg, keepSat * 0.92, keepLum * 0.28);

            if (keep < 0.06) {
              d[i + 3] = Math.round(a * 0.04);
              continue;
            }

            d[i] = Math.round(8 + r * 0.42 + (r + g + b) / 3 * 0.14);
            d[i + 1] = Math.round(10 + g * 0.46 + (r + g + b) / 3 * 0.14);
            d[i + 2] = Math.round(16 + b * 0.52 + (r + g + b) / 3 * 0.12);
            d[i + 3] = Math.round(a * clamp(0.46 + keep * 0.44, 0.42, 0.9));

            if (d[i + 3] > 18) {
              fgCount += 1;
              if (x < minX) minX = x;
              if (y < minY) minY = y;
              if (x > maxX) maxX = x;
              if (y > maxY) maxY = y;
            }
          }
        }

        pctx.putImageData(img, 0, 0);

        // 若抠图结果太少，直接回退原图，确保可见。
        if (fgCount < iw * ih * 0.035 || maxX < minX || maxY < minY) {
          return rawCanvas;
        }

        const bw = maxX - minX + 1;
        const bh = maxY - minY + 1;
        const mx = Math.max(4, Math.round(bw * 0.05));
        const my = Math.max(4, Math.round(bh * 0.05));
        const sx = Math.max(0, minX - mx);
        const sy = Math.max(0, minY - my);
        const ex = Math.min(iw, maxX + mx + 1);
        const ey = Math.min(ih, maxY + my + 1);
        const cw = ex - sx;
        const ch = ey - sy;

        const cropped = document.createElement("canvas");
        cropped.width = cw;
        cropped.height = ch;
        const cctx = cropped.getContext("2d");
        cctx.clearRect(0, 0, cw, ch);
        cctx.drawImage(out, sx, sy, cw, ch, 0, 0, cw, ch);
        return cropped;
      } catch (err) {
        return rawCanvas;
      }
    }

    function loadRolePortrait(roleIdx, sourceIdx = 0) {
      const role = roleConfigs[roleIdx];
      if (!role || sourceIdx >= role.sources.length) {
        rolePortraits[roleIdx].ready = false;
        return;
      }

      const img = new Image();
      img.addEventListener("load", () => {
        const c = processRolePortrait(img);
        rolePortraits[roleIdx].canvas = c;
        rolePortraits[roleIdx].ready = !!c;
      });
      img.addEventListener("error", () => {
        loadRolePortrait(roleIdx, sourceIdx + 1);
      });

      img.src = role.sources[sourceIdx];
      if (img.complete && img.naturalWidth > 0) {
        const c = processRolePortrait(img);
        rolePortraits[roleIdx].canvas = c;
        rolePortraits[roleIdx].ready = !!c;
      }
    }

    for (let i = 0; i < roleConfigs.length; i += 1) {
      loadRolePortrait(i);
    }

    function drawRoleReflection(roleIdx, x, y, w, h, alpha, tilt, mirror = false) {
      const role = roleConfigs[roleIdx];
      if (!role) return;


      const portrait = rolePortraits[roleIdx];
      if (!portrait || !portrait.ready || !portrait.canvas) {
        // 加载期间兜底，避免碎片里完全空白。
        ctx.save();
        ctx.translate(x + w * 0.46, y + h * 0.58);
        ctx.rotate(tilt);
        ctx.scale(mirror ? -1 : 1, 1);
        const bw = w * 0.32;
        const bh = h * 0.44;
        ctx.fillStyle = `rgba(10,14,22,${clamp(alpha * 0.45, 0.08, 0.35).toFixed(3)})`;
        ctx.beginPath();
        ctx.moveTo(-bw, bh * 0.9);
        ctx.lineTo(-bw * 1.2, 0);
        ctx.lineTo(-bw * 0.4, -bh * 0.95);
        ctx.lineTo(bw * 0.4, -bh);
        ctx.lineTo(bw, -bh * 0.25);
        ctx.lineTo(bw * 1.1, bh * 0.86);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        return;
      }

      const src = portrait.canvas;
      const sx = 0;
      const sy = Math.floor(src.height * role.frameY);
      const sw = src.width;
      const sh = Math.max(8, Math.floor(src.height * role.frameH));

      ctx.save();
      ctx.translate(x + w * 0.5, y + h * 0.5);
      ctx.rotate(tilt);
      ctx.scale(mirror ? -1 : 1, 1);

      const fit = Math.max(w / sw, h / sh) * 0.93;
      const drawW = sw * fit;
      const drawH = sh * fit;
      const dx = -drawW * (0.5 - (role.xBias || 0));
      const dy = -drawH * (0.5 + role.yBias);

      ctx.globalAlpha = clamp(alpha, 0, 0.9);
      ctx.filter = "blur(0.28px)";
      ctx.drawImage(src, sx, sy, sw, sh, dx, dy, drawW, drawH);
      ctx.filter = "none";

      ctx.globalCompositeOperation = "source-atop";
      ctx.fillStyle = `rgba(10,16,28,${(0.2 * alpha).toFixed(3)})`;
      ctx.fillRect(dx, dy, drawW, drawH);
      ctx.globalCompositeOperation = "source-over";
      ctx.restore();
    }

    function drawPathProgress(points, progress, color, width = 1) {
      if (progress <= 0) return;

      const p = clamp(progress, 0, 1);
      const segCount = points.length - 1;
      const segPos = segCount * p;
      const full = Math.floor(segPos);
      const part = segPos - full;

      for (let i = 0; i < full; i += 1) {
        drawLine(points[i].x, points[i].y, points[i + 1].x, points[i + 1].y, color, width);
      }

      if (full < segCount && part > 0) {
        const a = points[full];
        const b = points[full + 1];
        const mx = a.x + (b.x - a.x) * part;
        const my = a.y + (b.y - a.y) * part;
        drawLine(a.x, a.y, mx, my, color, width);
      }
    }

    function polygonPath(points) {
      if (!points.length) return;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i += 1) {
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.closePath();
    }

    function fillPolygon(points, color) {
      polygonPath(points);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function strokePolygon(points, color, width = 1) {
      polygonPath(points);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();
    }

    function polygonBounds(points) {
      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;

      for (let i = 0; i < points.length; i += 1) {
        minX = Math.min(minX, points[i].x);
        minY = Math.min(minY, points[i].y);
        maxX = Math.max(maxX, points[i].x);
        maxY = Math.max(maxY, points[i].y);
      }

      return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    }
    function drawShardReflection(piece, idx, reveal) {
      const bounds = polygonBounds(piece);
      if (bounds.w < 24 || bounds.h < 20) return;

      const rank = shardRankByIdx[idx];
      if (rank < 0 || rank >= roleConfigs.length) return;

      const roleIdx = rank;

      ctx.save();
      polygonPath(piece);
      ctx.clip();

      const glassBase = ctx.createLinearGradient(bounds.x, bounds.y, bounds.x + bounds.w, bounds.y + bounds.h);
      glassBase.addColorStop(0, `rgba(230,242,255,${(0.1 * reveal).toFixed(3)})`);
      glassBase.addColorStop(0.55, `rgba(188,212,245,${(0.16 * reveal).toFixed(3)})`);
      glassBase.addColorStop(1, `rgba(144,174,220,${(0.08 * reveal).toFixed(3)})`);
      ctx.fillStyle = glassBase;
      ctx.fillRect(bounds.x - 8, bounds.y - 8, bounds.w + 16, bounds.h + 16);

      const padX = Math.max(4, bounds.w * 0.06);
      const padY = Math.max(4, bounds.h * 0.06);
      const boxX = bounds.x + padX;
      const boxY = bounds.y + padY;
      const boxW = Math.max(8, bounds.w - padX * 2);
      const boxH = Math.max(8, bounds.h - padY * 2);

      const alpha = clamp((0.66 + (rank % 3) * 0.06) * reveal + 0.08, 0, 0.9);
      const tilt = (idx % 5 - 2) * 0.05;

      drawRoleReflection(roleIdx, boxX, boxY, boxW, boxH, alpha, tilt, idx % 2 === 0);


      if (roleConfigs[roleIdx] && roleConfigs[roleIdx].key !== "skater") {
        drawRoleReflection(roleIdx, boxX + 1.2, boxY + 0.8, boxW, boxH, alpha * 0.42, tilt * 0.7, idx % 2 !== 0);
      }

      ctx.globalCompositeOperation = "screen";
      const sheen = ctx.createLinearGradient(bounds.x - 14, bounds.y - 10, bounds.x + bounds.w + 14, bounds.y + bounds.h + 10);
      sheen.addColorStop(0, `rgba(255,255,255,${(0.16 * reveal).toFixed(3)})`);
      sheen.addColorStop(0.5, `rgba(210,232,255,${(0.06 * reveal).toFixed(3)})`);
      sheen.addColorStop(1, `rgba(255,255,255,${(0.12 * reveal).toFixed(3)})`);
      ctx.fillStyle = sheen;
      ctx.fillRect(bounds.x - 12, bounds.y - 12, bounds.w + 24, bounds.h + 24);

      drawLine(
        bounds.x - 18,
        bounds.y + bounds.h * 0.14,
        bounds.x + bounds.w + 18,
        bounds.y + bounds.h * 0.02,
        `rgba(246,250,255,${(0.28 * reveal).toFixed(3)})`,
        1
      );

      ctx.restore();
    }

    function drawSky(twilight) {
      const top = mixHex("#ffb164", "#120e22", twilight);
      const mid = mixHex("#e25b4c", "#271330", twilight);
      const low = mixHex("#6c314b", "#090f19", twilight);

      for (let y = 0; y < H; y += 4) {
        const n = y / H;
        const c = n < 0.42 ? mixHex(top, mid, n / 0.42) : mixHex(mid, low, (n - 0.42) / 0.58);
        px(0, y, W, 4, c);
      }

      const fog = mixHex("#f3d39a", "#4c2139", twilight);
      px(0, 102, W, 7, fog);
    }

    function drawSunMoon(twilight, pulse) {
      const sx = IMPACT_CENTER.x;
      const sy = IMPACT_CENTER.y;

      const sunR = 72 + pulse * 3;
      const sunMid = 53 + pulse * 2;
      const sunCore = 34 + pulse;

      drawCircle(sx, sy, sunR + 12, `rgba(255,170,105,${(0.26 * (1 - twilight)).toFixed(3)})`);
      drawCircle(sx, sy, sunR, mixHex("#ffc86f", "#b53a49", twilight));
      drawCircle(sx, sy, sunMid, mixHex("#ffe09e", "#da4e58", twilight));
      drawCircle(sx, sy, sunCore, mixHex("#fff4c8", "#ff8391", twilight));

      const moonA = clamp((twilight - 0.26) / 0.74, 0, 1);
      if (moonA > 0) {
        const moonR = 80 + pulse * 3;
        const mx = IMPACT_CENTER.x - 2;
        const my = IMPACT_CENTER.y - 2;
        drawCircle(mx, my, moonR + 10, `rgba(167,28,42,${(0.25 * moonA).toFixed(3)})`);
        drawCircle(mx, my, moonR, `rgba(158,24,39,${(0.8 * moonA).toFixed(3)})`);
        drawCircle(mx, my, moonR - 14, `rgba(219,67,82,${(0.88 * moonA).toFixed(3)})`);
        drawCircle(mx - 11, my - 8, 8, `rgba(255,170,170,${(0.72 * moonA).toFixed(3)})`);
        drawCircle(mx + 18, my + 7, 6, `rgba(139,18,29,${(0.52 * moonA).toFixed(3)})`);
      }

      return { x: sx, y: sy };
    }

    function drawPerspectiveValley(twilight) {
      const far = mixHex("#4e3d61", "#1b1d37", twilight);
      const mid = mixHex("#3c2c4d", "#101726", twilight);
      const near = mixHex("#2a2139", "#0a101d", twilight);

      for (let x = 0; x < W; x += 10) {
        const wave = Math.sin(x * 0.08) * 5 + Math.cos(x * 0.05) * 3;
        const y = 116 - wave;
        px(x, y, 10, H - y, far);
      }

      for (let x = 0; x < W; x += 8) {
        const t = Math.abs((x - 180) / 176);
        const p = clamp(1 - t, 0, 1);
        const y = 152 - p * 36;
        px(x, y, 8, H - y, mid);
      }

      for (let i = 0; i < 18; i += 1) {
        const z = i / 17;
        const y = 154 + z * 74;
        const width = 24 + z * 414;
        const left = (W - width) * 0.5;
        const c = i % 2 === 0 ? mixHex("#6f4a4c", "#2e2230", twilight) : mixHex("#603f4a", "#241d2c", twilight);
        px(left, y, width, 2, c);
      }

      const vanishX = 122;
      const vanishY = 112;
      for (let i = 0; i < 10; i += 1) {
        const k = i / 9;
        const lx = 36 + k * 102;
        const rx = W - 36 - k * 70;
        const y0 = H;
        for (let s = 0; s <= 1; s += 1 / 24) {
          const y = y0 + (vanishY - y0) * s;
          const xL = lx + (vanishX - lx) * s;
          const xR = rx + (vanishX - rx) * s;
          px(xL, y, 1, 1, near);
          px(xR, y, 1, 1, near);
        }
      }
    }

    function drawCliff(twilight) {
      const top = mixHex("#3a3236", "#1b181f", twilight);
      const sideL = mixHex("#2a242a", "#15141a", twilight);
      const sideR = mixHex("#1f1c24", "#0f1118", twilight);

      const tipX = 338;
      const tipY = 171;

      for (let y = tipY; y < H; y += 1) {
        const t = (y - tipY) / (H - tipY);
        const halfL = 2 + t * 108;
        const halfR = 2 + t * 62;
        px(tipX - halfL, y, halfL, 1, sideL);
        px(tipX, y, halfR, 1, sideR);
      }

      px(tipX - 5, tipY - 1, 10, 3, top);
      for (let i = 0; i < 11; i += 1) {
        const y = tipY + 8 + i * 6;
        const cut = (i % 2) * 4;
        px(tipX - 16 - i * 4, y, 9 - cut, 1, "rgba(14,14,18,0.42)");
        px(tipX + 6 + i * 3, y + 2, 7 - cut, 1, "rgba(12,12,16,0.44)");
      }

      return { x: tipX, y: tipY };
    }

    function drawHeroBack(anchor, recoil, flash, t) {
      const bob = Math.sin(t * 0.006) * 0.8;
      const x = Math.round(anchor.x - recoil * 2);
      const y = Math.round(anchor.y + bob);
      const s = 2;

      px(x - 7 * s, y + 1 * s, 14 * s, 2 * s, "rgba(7,10,14,0.55)");
      px(x - 3 * s, y - 5 * s, 6 * s, 8 * s, "#3a4d72");
      px(x - 5 * s, y - 4 * s, 2 * s, 8 * s, "#b4434f");
      px(x + 3 * s, y - 3 * s, 2 * s, 6 * s, "#a03945");
      px(x - 3 * s, y - 10 * s, 6 * s, 4 * s, "#30201b");
      px(x - 2 * s, y - 9 * s, 4 * s, 2 * s, "#4a3026");
      px(x - 1 * s, y + 2 * s, 2 * s, 5 * s, "#26344e");

      // 枪口朝左上，不绘制弹道射线。
      px(x - 12 * s, y - 6 * s, 7 * s, 2 * s, "#1a2336");
      px(x - 14 * s, y - 7 * s, 2 * s, 4 * s, "#242f46");

      if (flash > 0) {
        const f = clamp(flash, 0, 1);
        px(x - 17 * s - f * 1.5, y - 7 * s, 3 + f * 2, 4, "#ffd58b");
        px(x - 20 * s - f * 2, y - 6 * s, 4 + f * 3, 2, "#fff2bf");
      }
    }

    function drawGlassCrack(progress) {
      if (progress <= 0) return;

      const p = clamp(progress, 0, 1);
      const crackP = clamp(p / 0.62, 0, 1);
      const seamP = clamp((p - 0.16) / 0.84, 0, 1);
      const mirrorP = clamp((p - 0.42) / 0.58, 0, 1);

      for (let i = 0; i < glassPattern.spokes.length; i += 1) {
        const spoke = glassPattern.spokes[i];
        drawPathProgress(spoke, crackP, "rgba(245,240,236,0.9)", 2);
        drawPathProgress(spoke, crackP, "rgba(156,118,118,0.62)", 1);
      }

      for (let i = 0; i < glassPattern.seams.length; i += 1) {
        drawPathProgress(glassPattern.seams[i], seamP, "rgba(232,226,226,0.7)", 1);
      }

      if (mirrorP > 0) {
        for (let i = 0; i < glassPattern.pieces.length; i += 1) {
          const piece = glassPattern.pieces[i];
          const tint = 0.04 + mirrorP * (0.06 + (i % 3) * 0.02);
          fillPolygon(piece, `rgba(210,220,240,${tint.toFixed(3)})`);
          strokePolygon(piece, `rgba(245,241,237,${(0.2 + mirrorP * 0.34).toFixed(3)})`, 1);
          drawShardReflection(piece, i, mirrorP);
        }
      }

      drawCircle(IMPACT_CENTER.x, IMPACT_CENTER.y, 2 + p * 2, `rgba(255,246,236,${(0.35 * p).toFixed(3)})`);
      px(0, 0, W, H, `rgba(228,236,255,${(0.012 + 0.02 * p).toFixed(3)})`);
    }

    function drawForegroundMask() {
      px(0, H - 20, W, 20, "rgba(6,9,14,0.55)");
      px(0, 0, W, 10, "rgba(7,8,13,0.45)");
      px(0, 0, 10, H, "rgba(7,8,13,0.38)");
      px(W - 10, 0, 10, H, "rgba(7,8,13,0.38)");

      for (let i = 0; i < 26; i += 1) {
        const x = (i * 19) % W;
        const h = 6 + (i % 5) * 3;
        px(x, H - h, 7, h, "rgba(7,9,13,0.72)");
      }
    }

    function drawCinematic(now) {
      const elapsed = (now - state.startAt) / 1000;

      if (elapsed > 1.0 && !state.shotAt) {
        state.shotAt = now;
        state.shakeUntil = now + 980;
      }

      if (state.shotAt) {
        state.twilight = clamp((now - state.shotAt) / 1900, 0, 1);
        state.crack = clamp((now - state.shotAt) / 900, 0, 1);
      }

      const shotElapsed = state.shotAt ? now - state.shotAt : -999;
      const flash = shotElapsed >= 0 && shotElapsed < 160 ? 1 - shotElapsed / 160 : 0;
      const recoil = shotElapsed >= 0 && shotElapsed < 220 ? 1 - shotElapsed / 220 : 0;

      drawSky(state.twilight);
      drawSunMoon(state.twilight, Math.sin(now * 0.008) * 0.5 + 0.5);
      drawPerspectiveValley(state.twilight);
      const cliffTip = drawCliff(state.twilight);
      drawHeroBack({ x: cliffTip.x - 12, y: cliffTip.y + 17 }, recoil, flash, now);
      drawGlassCrack(state.crack);
      drawForegroundMask();

      if (elapsed > 3.2 && state.phase === "cinematic") {
        state.phase = "ready";
        state.readyAt = now;
        hint.classList.add("show");
      }
    }

    function drawEnter(now) {
      drawCinematic(now);
      const k = clamp((now - state.enterAt) / 700, 0, 1);
      px(0, 0, W, H, `rgba(0,0,0,${k.toFixed(3)})`);
      if (k > 0.45) {
        const a = clamp((k - 0.45) / 0.55, 0, 1);
        ctx.fillStyle = `rgba(245,236,218,${a.toFixed(3)})`;
        ctx.font = "bold 15px 'Microsoft YaHei', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("游戏开始", W * 0.5, H * 0.52);
      }
      if (k >= 1) {
        state.phase = "started";
        tag.textContent = "已进入游戏（可接主场景）";
      }
    }

    function drawStarted(now) {
      drawSky(1);
      drawSunMoon(1, Math.sin(now * 0.01) * 0.5 + 0.5);
      drawPerspectiveValley(1);
      drawCliff(1);
      drawForegroundMask();

      ctx.fillStyle = "rgba(236,228,211,0.95)";
      ctx.font = "13px 'Microsoft YaHei', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("主场景已接管（示意）", W * 0.5, H - 18);
    }

    function loop(now) {
      ctx.save();
      ctx.clearRect(0, 0, W, H);

      if (state.shakeUntil > now && state.phase !== "started") {
        const q = clamp((state.shakeUntil - now) / 980, 0, 1);
        const amp = q * 7.4;
        const sx = (Math.random() * 2 - 1) * amp;
        const sy = (Math.random() * 2 - 1) * amp;
        ctx.translate(Math.round(sx), Math.round(sy));
      }

      if (state.phase === "cinematic" || state.phase === "ready") {
        drawCinematic(now);
      } else if (state.phase === "entering") {
        drawEnter(now);
      } else {
        drawStarted(now);
      }

      ctx.restore();

      if (state.phase === "ready") {
        const blink = Math.sin(now * 0.01) * 0.5 + 0.5;
        hint.style.opacity = (0.45 + blink * 0.55).toFixed(3);
      }

      requestAnimationFrame(loop);
    }

    viewport.addEventListener("pointermove", (e) => {
      const r = canvas.getBoundingClientRect();
      state.mouseX = ((e.clientX - r.left) / r.width) * W;
      state.mouseY = ((e.clientY - r.top) / r.height) * H;
    });

    function tryStartGame() {
      if (state.phase === "ready") {
        state.phase = "entering";
        state.enterAt = performance.now();
        hint.classList.remove("show");
      }
    }

    viewport.addEventListener("pointerdown", tryStartGame);
    viewport.addEventListener("click", tryStartGame);
    viewport.addEventListener("touchstart", tryStartGame, { passive: true });

    requestAnimationFrame(loop);
  </script>
</body>
</html>
