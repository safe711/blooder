<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>吸血鬼资本家 - 3D片头模式</title>
  <style>
    :root {
      --bg-a: #070d15;
      --bg-b: #151c2a;
      --panel: rgba(14, 20, 30, 0.8);
      --edge: rgba(140, 154, 181, 0.35);
      --text: #eef3ff;
      --sub: #9fb0cd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 18%, #2c3e59 0%, transparent 42%),
        radial-gradient(circle at 85% 78%, #3b2432 0%, transparent 44%),
        linear-gradient(160deg, var(--bg-a), var(--bg-b));
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      padding: 22px;
    }

    .wrap {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 16px;
      align-items: start;
    }

    .viewer {
      background: #090f17;
      border: 1px solid #273244;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 22px 44px rgba(0, 0, 0, 0.4);
    }

    .viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid #253145;
      border-radius: 10px;
      overflow: hidden;
      background: #0a0f16;
      cursor: crosshair;
      user-select: none;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .tag {
      position: absolute;
      top: 9px;
      left: 9px;
      font-size: 11px;
      z-index: 4;
      color: #f8e4bb;
      border: 1px solid rgba(252, 214, 132, 0.52);
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(10, 15, 24, 0.72);
      pointer-events: none;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 4;
      color: #fff2d9;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.75);
      opacity: 0;
      transition: opacity 220ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .hint.show {
      opacity: 1;
    }

    .panel {
      border: 1px solid var(--edge);
      border-radius: 14px;
      background: var(--panel);
      padding: 14px;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.32);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 17px;
      color: #f5f8ff;
    }

    p {
      margin: 0 0 10px;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.55;
    }

    .pill {
      display: inline-block;
      margin: 4px 5px 0 0;
      background: #87b5f1;
      color: #0f1725;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 600;
    }

    .pill.hot {
      background: #f4b35f;
    }

    .pill.blood {
      background: #df737d;
    }

    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="viewer">
      <div class="viewport" id="viewport">
        <canvas id="scene" width="426" height="240"></canvas>
        <div class="tag" id="tag">独立片头文件 · 3D冲击版</div>
        <div class="hint" id="hint">点击任意位置开始游戏</div>
      </div>
    </section>

    <aside class="panel">
      <h1>片头强化点</h1>
      <p>太阳和血月保持在左上高压构图，角色位于右下背身朝左上。枪击后使用“几大块玻璃”式碎裂，而不是细密裂纹。</p>
      <p>每块分片内现在是高细节矢量胸像剪影反射：女忍者、龙族、章鱼、大脑很大、恶魔、瘦弱的人，并用更强的发光眼睛与镜面高光强化识别。</p>

      <span class="pill hot">左上超大天体</span>
      <span class="pill blood">血月压迫</span>
      <span class="pill">右下背身主角</span>
      <span class="pill">几大块碎片</span>
      <span class="pill">镜面黑影</span>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const viewport = document.getElementById("viewport");
    const hint = document.getElementById("hint");
    const tag = document.getElementById("tag");

    const W = canvas.width;
    const H = canvas.height;
    const IMPACT_CENTER = { x: 102, y: 58 };

    ctx.imageSmoothingEnabled = false;

    const state = {
      phase: "cinematic",
      startAt: performance.now(),
      shotAt: null,
      readyAt: null,
      enterAt: null,
      twilight: 0,
      crack: 0,
      shakeUntil: 0,
      mouseX: W * 0.5,
      mouseY: H * 0.5,
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function mixHex(a, b, t) {
      const n = clamp(t, 0, 1);
      const A = a.replace("#", "");
      const B = b.replace("#", "");
      const ar = parseInt(A.slice(0, 2), 16);
      const ag = parseInt(A.slice(2, 4), 16);
      const ab = parseInt(A.slice(4, 6), 16);
      const br = parseInt(B.slice(0, 2), 16);
      const bg = parseInt(B.slice(2, 4), 16);
      const bb = parseInt(B.slice(4, 6), 16);
      const r = Math.round(ar + (br - ar) * n).toString(16).padStart(2, "0");
      const g = Math.round(ag + (bg - ag) * n).toString(16).padStart(2, "0");
      const b2 = Math.round(ab + (bb - ab) * n).toString(16).padStart(2, "0");
      return `#${r}${g}${b2}`;
    }

    function px(x, y, w, h, c) {
      ctx.fillStyle = c;
      ctx.fillRect(Math.round(x), Math.round(y), Math.max(1, Math.round(w)), Math.max(1, Math.round(h)));
    }

    function drawLine(x0, y0, x1, y1, color, width = 1) {
      let sx0 = Math.round(x0);
      let sy0 = Math.round(y0);
      const sx1 = Math.round(x1);
      const sy1 = Math.round(y1);
      const dx = Math.abs(sx1 - sx0);
      const dy = Math.abs(sy1 - sy0);
      const stepx = sx0 < sx1 ? 1 : -1;
      const stepy = sy0 < sy1 ? 1 : -1;
      let err = dx - dy;

      while (true) {
        if (width > 1) {
          px(sx0 - 1, sy0 - 1, width, width, color);
        } else {
          px(sx0, sy0, 1, 1, color);
        }

        if (sx0 === sx1 && sy0 === sy1) break;

        const e2 = err * 2;
        if (e2 > -dy) {
          err -= dy;
          sx0 += stepx;
        }
        if (e2 < dx) {
          err += dx;
          sy0 += stepy;
        }
      }
    }

    function drawCircle(cx, cy, r, color) {
      const rr = Math.round(r);
      for (let y = -rr; y <= rr; y += 1) {
        const w = Math.floor(Math.sqrt(Math.max(0, rr * rr - y * y)));
        px(cx - w, cy + y, w * 2 + 1, 1, color);
      }
    }

    function perimeterPoint(t) {
      const n = ((t % 1) + 1) % 1;
      if (n < 0.25) {
        return { x: n / 0.25 * (W - 1), y: 0 };
      }
      if (n < 0.5) {
        return { x: W - 1, y: (n - 0.25) / 0.25 * (H - 1) };
      }
      if (n < 0.75) {
        return { x: (1 - (n - 0.5) / 0.25) * (W - 1), y: H - 1 };
      }
      return { x: 0, y: (1 - (n - 0.75) / 0.25) * (H - 1) };
    }

    function createGlassPattern(center) {
      const spokes = [];
      const seams = [];
      const pieces = [];
      const inner = [];
      const spokeCount = 6;

      for (let i = 0; i < spokeCount; i += 1) {
        const jitter = Math.sin(i * 1.97) * 0.016;
        const edge = perimeterPoint(i / spokeCount + jitter);
        const dx = edge.x - center.x;
        const dy = edge.y - center.y;
        const dist = Math.hypot(dx, dy);
        const dirx = dx / dist;
        const diry = dy / dist;
        const nx = -diry;
        const ny = dirx;

        const bend = Math.sin(i * 2.35) * (10 + (i % 3) * 4);
        const mid = {
          x: center.x + dirx * dist * 0.52 + nx * bend,
          y: center.y + diry * dist * 0.52 + ny * bend,
        };
        spokes.push([{ x: center.x, y: center.y }, mid, edge]);

        const innerR = 16 + (i % 3) * 4;
        inner.push({
          x: center.x + dirx * innerR,
          y: center.y + diry * innerR,
        });
      }

      for (let i = 0; i < spokeCount; i += 1) {
        const next = (i + 1) % spokeCount;
        seams.push([inner[i], inner[next]]);
        seams.push([inner[i], spokes[i][1]]);
        if (i % 2 === 0) {
          seams.push([spokes[i][1], spokes[next][1]]);
        }

        pieces.push([
          inner[i],
          spokes[i][1],
          spokes[i][2],
          spokes[next][2],
          spokes[next][1],
          inner[next],
        ]);
      }

      return { spokes, seams, pieces };
    }

    const glassPattern = createGlassPattern(IMPACT_CENTER);
    const shardBustVariants = ["kunoichi", "dragonborn", "octopus", "bigbrain", "demon", "thin"];

    function drawPathProgress(points, progress, color, width = 1) {
      if (progress <= 0) return;

      const p = clamp(progress, 0, 1);
      const segCount = points.length - 1;
      const segPos = segCount * p;
      const full = Math.floor(segPos);
      const part = segPos - full;

      for (let i = 0; i < full; i += 1) {
        drawLine(points[i].x, points[i].y, points[i + 1].x, points[i + 1].y, color, width);
      }

      if (full < segCount && part > 0) {
        const a = points[full];
        const b = points[full + 1];
        const mx = a.x + (b.x - a.x) * part;
        const my = a.y + (b.y - a.y) * part;
        drawLine(a.x, a.y, mx, my, color, width);
      }
    }

    function polygonPath(points) {
      if (!points.length) return;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i += 1) {
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.closePath();
    }

    function fillPolygon(points, color) {
      polygonPath(points);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function strokePolygon(points, color, width = 1) {
      polygonPath(points);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();
    }

    function polygonCentroid(points) {
      let x = 0;
      let y = 0;
      for (let i = 0; i < points.length; i += 1) {
        x += points[i].x;
        y += points[i].y;
      }
      return { x: x / points.length, y: y / points.length };
    }

    function polygonBounds(points) {
      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;

      for (let i = 0; i < points.length; i += 1) {
        minX = Math.min(minX, points[i].x);
        minY = Math.min(minY, points[i].y);
        maxX = Math.max(maxX, points[i].x);
        maxY = Math.max(maxY, points[i].y);
      }

      return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    }

    function drawBustSilhouette(x, y, scale, alpha, variant, tilt, flip) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(tilt);
      ctx.scale((flip ? -1 : 1) * scale, scale);

      const a = clamp(alpha, 0, 0.92);
      const bodyDark = `rgba(3,5,9,${a.toFixed(3)})`;
      const bodyMid = `rgba(16,22,34,${(a * 0.9).toFixed(3)})`;
      const rim = `rgba(190,220,255,${(a * 0.26).toFixed(3)})`;

      const fillPoly = (pts, color) => {
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i = 1; i < pts.length; i += 1) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      };

      const fillPath = (drawer, color) => {
        ctx.beginPath();
        drawer();
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      };

      const fillEllipse = (cx, cy, rx, ry, color) => {
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      };

      const drawBaseBust = (neckW, shoulderW, yBase) => {
        fillPoly([
          [-shoulderW, yBase], [shoulderW, yBase], [shoulderW - 3, yBase - 8],
          [neckW + 1, yBase - 11], [-neckW - 1, yBase - 11], [-shoulderW + 3, yBase - 8]
        ], bodyDark);
        fillPoly([
          [-shoulderW + 2, yBase - 0.5], [shoulderW - 2, yBase - 0.5], [shoulderW - 5, yBase - 6],
          [neckW - 1, yBase - 9], [-neckW + 1, yBase - 9], [-shoulderW + 5, yBase - 6]
        ], bodyMid);
      };

      const glowEye = (x0, y0, glow, core, mode = "round") => {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        if (mode === "slit") {
          fillEllipse(x0, y0, 2.1, 0.75, glow);
          fillEllipse(x0, y0, 0.45, 0.75, core);
        } else if (mode === "dot") {
          fillEllipse(x0, y0, 1.4, 1.1, glow);
          fillEllipse(x0, y0, 0.55, 0.55, core);
        } else if (mode === "tri") {
          fillPoly([[x0 - 1.8, y0 + 0.6], [x0 + 1.8, y0 + 0.6], [x0, y0 - 1.2]], glow);
          fillPoly([[x0 - 0.8, y0 + 0.2], [x0 + 0.8, y0 + 0.2], [x0, y0 - 0.6]], core);
        } else {
          fillEllipse(x0, y0, 1.9, 0.9, glow);
          fillEllipse(x0, y0, 0.9, 0.45, core);
        }
        ctx.restore();
      };

      switch (variant) {
        case "kunoichi": {
          drawBaseBust(5.6, 14.5, 10.5);

          // 兜帽轮廓 + 发髻 + 侧马尾
          fillPath(() => {
            ctx.moveTo(-8.8, -2.4);
            ctx.bezierCurveTo(-10.5, -8.5, -7.8, -13.7, -2.5, -15.2);
            ctx.bezierCurveTo(2.4, -16.4, 7.8, -13.4, 9.6, -8.1);
            ctx.bezierCurveTo(10.8, -4.6, 9.1, -1.3, 6.2, 1.2);
            ctx.bezierCurveTo(2.2, 3.2, -2.2, 3.2, -6.1, 1.1);
          }, bodyDark);

          fillPath(() => {
            ctx.moveTo(7.4, -9.7);
            ctx.bezierCurveTo(12.5, -10.1, 15.9, -7.4, 15.6, -3.3);
            ctx.bezierCurveTo(14.5, -1.2, 12.3, -0.5, 9.6, -1.5);
            ctx.bezierCurveTo(8.5, -3.8, 8.2, -6.2, 7.4, -9.7);
          }, bodyDark);

          fillPoly([[-7.6, -9.0], [7.2, -9.0], [6.5, -5.7], [-6.7, -5.7]], bodyMid); // 护额与面罩上缘
          fillPoly([[-6.4, -4.9], [6.1, -4.9], [4.2, -1.8], [-4.3, -1.8]], bodyMid); // 面罩下缘

          glowEye(-2.65, -6.9, `rgba(130,230,255,${(a * 0.8).toFixed(3)})`, `rgba(238,251,255,${(a * 0.92).toFixed(3)})`, "slit");
          glowEye(2.65, -6.9, `rgba(130,230,255,${(a * 0.8).toFixed(3)})`, `rgba(238,251,255,${(a * 0.92).toFixed(3)})`, "slit");
          break;
        }

        case "dragonborn": {
          drawBaseBust(6.5, 15.2, 10.8);

          // 龙首：额骨 + 吻部前伸 + 双角
          fillPath(() => {
            ctx.moveTo(-7.5, -2.7);
            ctx.bezierCurveTo(-8.3, -9.5, -4.2, -14.8, 2.6, -15.0);
            ctx.bezierCurveTo(7.0, -14.7, 9.7, -12.4, 10.7, -9.1);
            ctx.bezierCurveTo(14.9, -8.8, 17.4, -7.5, 18.2, -5.2);
            ctx.bezierCurveTo(16.6, -2.8, 14.0, -2.0, 10.2, -2.2);
            ctx.bezierCurveTo(8.1, 1.0, 4.5, 2.8, -0.5, 2.8);
            ctx.bezierCurveTo(-4.8, 2.3, -7.1, 0.6, -7.5, -2.7);
          }, bodyDark);

          fillPoly([[-5.4, -11.7], [-9.8, -18.2], [-3.1, -11.0]], bodyDark);
          fillPoly([[2.4, -12.0], [8.0, -18.4], [4.4, -10.9]], bodyDark);
          fillPoly([[-7.1, -1.4], [8.2, -1.4], [6.1, 2.0], [-5.6, 2.0]], bodyMid); // 下颌鳞片

          glowEye(-1.8, -6.7, `rgba(255,170,92,${(a * 0.8).toFixed(3)})`, `rgba(255,236,182,${(a * 0.95).toFixed(3)})`, "slit");
          glowEye(2.8, -6.6, `rgba(255,170,92,${(a * 0.8).toFixed(3)})`, `rgba(255,236,182,${(a * 0.95).toFixed(3)})`, "slit");
          break;
        }

        case "octopus": {
          drawBaseBust(6.3, 14.7, 10.6);

          // 头囊
          fillEllipse(0, -9.0, 8.9, 6.9, bodyDark);

          // 六条触手胸像下垂
          for (let i = 0; i < 6; i += 1) {
            const tx = -10 + i * 4;
            fillPath(() => {
              ctx.moveTo(tx, -2.9);
              ctx.bezierCurveTo(tx + 2.0, -3.5, tx + 3.2, -2.2, tx + 2.9, 1.1);
              ctx.bezierCurveTo(tx + 2.2, 5.8, tx + 3.6, 8.5, tx + 1.4, 10.2);
              ctx.bezierCurveTo(tx - 1.0, 9.3, tx - 0.8, 6.7, tx - 1.2, 2.0);
              ctx.bezierCurveTo(tx - 1.4, -0.8, tx - 1.2, -2.0, tx, -2.9);
            }, bodyMid);
          }

          fillPoly([[-7.3, -1.8], [7.3, -1.8], [6.0, 2.1], [-6.0, 2.1]], bodyMid);

          glowEye(-2.8, -9.0, `rgba(170,240,255,${(a * 0.78).toFixed(3)})`, `rgba(245,252,255,${(a * 0.94).toFixed(3)})`, "dot");
          glowEye(2.8, -9.0, `rgba(170,240,255,${(a * 0.78).toFixed(3)})`, `rgba(245,252,255,${(a * 0.94).toFixed(3)})`, "dot");
          break;
        }

        case "bigbrain": {
          drawBaseBust(4.7, 12.0, 10.6);

          // 超大脑壳
          fillEllipse(0, -11.1, 11.4, 9.2, bodyDark);

          // 脑回阴影切面
          fillPath(() => {
            ctx.moveTo(-8.8, -12.4);
            ctx.bezierCurveTo(-5.4, -10.4, -2.0, -13.8, 1.5, -11.7);
            ctx.bezierCurveTo(4.0, -9.9, 6.2, -12.9, 8.2, -11.0);
            ctx.bezierCurveTo(6.7, -8.2, 3.4, -7.9, 0.4, -8.1);
            ctx.bezierCurveTo(-2.8, -8.4, -5.8, -8.6, -8.8, -12.4);
          }, bodyMid);

          fillPoly([[-4.5, -1.8], [4.5, -1.8], [3.2, 2.3], [-3.2, 2.3]], bodyMid);

          glowEye(-3.1, -10.3, `rgba(188,160,255,${(a * 0.8).toFixed(3)})`, `rgba(240,231,255,${(a * 0.95).toFixed(3)})`, "round");
          glowEye(3.1, -10.3, `rgba(188,160,255,${(a * 0.8).toFixed(3)})`, `rgba(240,231,255,${(a * 0.95).toFixed(3)})`, "round");
          break;
        }

        case "demon": {
          drawBaseBust(6.8, 16.2, 10.9);

          fillEllipse(0, -7.7, 7.3, 8.3, bodyDark);

          // 恶魔角
          fillPath(() => {
            ctx.moveTo(-5.3, -12.1);
            ctx.bezierCurveTo(-8.2, -18.8, -10.8, -20.4, -12.0, -18.1);
            ctx.bezierCurveTo(-10.4, -14.4, -9.1, -12.3, -6.0, -10.5);
          }, bodyDark);
          fillPath(() => {
            ctx.moveTo(5.3, -12.1);
            ctx.bezierCurveTo(8.2, -18.8, 10.8, -20.4, 12.0, -18.1);
            ctx.bezierCurveTo(10.4, -14.4, 9.1, -12.3, 6.0, -10.5);
          }, bodyDark);

          // 翼肩
          fillPoly([[-16.2, 1.4], [-8.8, -2.8], [-7.0, 4.5]], bodyDark);
          fillPoly([[16.2, 1.4], [8.8, -2.8], [7.0, 4.5]], bodyDark);

          glowEye(-2.5, -7.5, `rgba(255,96,96,${(a * 0.9).toFixed(3)})`, `rgba(255,224,224,${(a * 0.96).toFixed(3)})`, "tri");
          glowEye(2.5, -7.5, `rgba(255,96,96,${(a * 0.9).toFixed(3)})`, `rgba(255,224,224,${(a * 0.96).toFixed(3)})`, "tri");
          break;
        }

        case "thin": {
          drawBaseBust(3.1, 10.8, 10.8);

          fillPath(() => {
            ctx.moveTo(-4.2, -3.3);
            ctx.bezierCurveTo(-4.8, -8.9, -2.7, -13.2, 0.0, -14.1);
            ctx.bezierCurveTo(2.6, -13.2, 4.5, -8.9, 4.2, -3.3);
            ctx.bezierCurveTo(3.2, 0.5, 1.5, 1.8, 0.0, 1.9);
            ctx.bezierCurveTo(-1.7, 1.7, -3.4, 0.4, -4.2, -3.3);
          }, bodyDark);

          fillPoly([[-1.6, -2.4], [1.6, -2.4], [1.2, 5.2], [-1.2, 5.2]], bodyMid); // 细长脖颈
          fillPoly([[-8.9, 2.4], [8.9, 2.4], [7.0, 5.8], [-7.0, 5.8]], bodyMid);

          glowEye(-1.5, -8.0, `rgba(206,232,255,${(a * 0.72).toFixed(3)})`, `rgba(248,252,255,${(a * 0.94).toFixed(3)})`, "round");
          glowEye(1.5, -8.0, `rgba(206,232,255,${(a * 0.72).toFixed(3)})`, `rgba(248,252,255,${(a * 0.94).toFixed(3)})`, "round");
          break;
        }

        default: {
          drawBaseBust(5.2, 12.5, 10.5);
          fillEllipse(0, -7.5, 6.2, 7.2, bodyDark);
          glowEye(-2.2, -7.0, `rgba(180,220,255,${(a * 0.75).toFixed(3)})`, `rgba(246,252,255,${(a * 0.9).toFixed(3)})`);
          glowEye(2.2, -7.0, `rgba(180,220,255,${(a * 0.75).toFixed(3)})`, `rgba(246,252,255,${(a * 0.9).toFixed(3)})`);
          break;
        }
      }

      // 碎片反光边缘痕迹，强调“玻璃镜面映射”。
      ctx.strokeStyle = rim;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-12.8, -11.8);
      ctx.lineTo(-5.8, -13.8);
      ctx.lineTo(-1.8, -6.6);
      ctx.stroke();

      ctx.restore();
    }

    function drawShardReflection(piece, idx, reveal) {
      const bounds = polygonBounds(piece);
      if (bounds.w < 36 || bounds.h < 28) return;

      const c = polygonCentroid(piece);
      const variant = shardBustVariants[idx % shardBustVariants.length];
      const scale = clamp(Math.min(bounds.w / 9.2, bounds.h / 5.9), 4.1, 8.4);
      const alpha = (0.36 + (idx % 3) * 0.13) * reveal;
      const offX = Math.sin(idx * 1.65) * bounds.w * 0.06;
      const offY = Math.cos(idx * 1.2) * bounds.h * 0.05;
      const tilt = (idx % 5 - 2) * 0.09;

      ctx.save();
      polygonPath(piece);
      ctx.clip();

      const grad = ctx.createLinearGradient(bounds.x - 18, bounds.y - 8, bounds.x + bounds.w + 24, bounds.y + bounds.h + 10);
      grad.addColorStop(0, `rgba(236,245,255,${(0.06 * reveal).toFixed(3)})`);
      grad.addColorStop(0.45, `rgba(210,226,255,${(0.12 * reveal).toFixed(3)})`);
      grad.addColorStop(1, `rgba(160,188,235,${(0.04 * reveal).toFixed(3)})`);
      ctx.fillStyle = grad;
      ctx.fillRect(bounds.x - 24, bounds.y - 18, bounds.w + 48, bounds.h + 36);

      drawLine(
        bounds.x - 28,
        bounds.y + bounds.h * (0.18 + (idx % 3) * 0.13),
        bounds.x + bounds.w + 28,
        bounds.y + bounds.h * (0.04 + (idx % 4) * 0.16),
        `rgba(244,248,255,${(0.16 * reveal).toFixed(3)})`,
        1
      );

      drawBustSilhouette(c.x + offX, c.y + offY + 9, scale, alpha, variant, tilt, idx % 2 === 0);
      drawBustSilhouette(c.x + offX + 1.3, c.y + offY + 9.2, scale * 0.96, alpha * 0.38, variant, tilt * 0.75, idx % 2 !== 0);

      ctx.restore();
    }

    function drawSky(twilight) {
      const top = mixHex("#ffb164", "#120e22", twilight);
      const mid = mixHex("#e25b4c", "#271330", twilight);
      const low = mixHex("#6c314b", "#090f19", twilight);

      for (let y = 0; y < H; y += 4) {
        const n = y / H;
        const c = n < 0.42 ? mixHex(top, mid, n / 0.42) : mixHex(mid, low, (n - 0.42) / 0.58);
        px(0, y, W, 4, c);
      }

      const fog = mixHex("#f3d39a", "#4c2139", twilight);
      px(0, 102, W, 7, fog);
    }

    function drawSunMoon(twilight, pulse) {
      const sx = IMPACT_CENTER.x;
      const sy = IMPACT_CENTER.y;

      const sunR = 72 + pulse * 3;
      const sunMid = 53 + pulse * 2;
      const sunCore = 34 + pulse;

      drawCircle(sx, sy, sunR + 12, `rgba(255,170,105,${(0.26 * (1 - twilight)).toFixed(3)})`);
      drawCircle(sx, sy, sunR, mixHex("#ffc86f", "#b53a49", twilight));
      drawCircle(sx, sy, sunMid, mixHex("#ffe09e", "#da4e58", twilight));
      drawCircle(sx, sy, sunCore, mixHex("#fff4c8", "#ff8391", twilight));

      const moonA = clamp((twilight - 0.26) / 0.74, 0, 1);
      if (moonA > 0) {
        const moonR = 80 + pulse * 3;
        const mx = IMPACT_CENTER.x - 2;
        const my = IMPACT_CENTER.y - 2;
        drawCircle(mx, my, moonR + 10, `rgba(167,28,42,${(0.25 * moonA).toFixed(3)})`);
        drawCircle(mx, my, moonR, `rgba(158,24,39,${(0.8 * moonA).toFixed(3)})`);
        drawCircle(mx, my, moonR - 14, `rgba(219,67,82,${(0.88 * moonA).toFixed(3)})`);
        drawCircle(mx - 11, my - 8, 8, `rgba(255,170,170,${(0.72 * moonA).toFixed(3)})`);
        drawCircle(mx + 18, my + 7, 6, `rgba(139,18,29,${(0.52 * moonA).toFixed(3)})`);
      }

      return { x: sx, y: sy };
    }

    function drawPerspectiveValley(twilight) {
      const far = mixHex("#4e3d61", "#1b1d37", twilight);
      const mid = mixHex("#3c2c4d", "#101726", twilight);
      const near = mixHex("#2a2139", "#0a101d", twilight);

      for (let x = 0; x < W; x += 10) {
        const wave = Math.sin(x * 0.08) * 5 + Math.cos(x * 0.05) * 3;
        const y = 116 - wave;
        px(x, y, 10, H - y, far);
      }

      for (let x = 0; x < W; x += 8) {
        const t = Math.abs((x - 180) / 176);
        const p = clamp(1 - t, 0, 1);
        const y = 152 - p * 36;
        px(x, y, 8, H - y, mid);
      }

      for (let i = 0; i < 18; i += 1) {
        const z = i / 17;
        const y = 154 + z * 74;
        const width = 24 + z * 414;
        const left = (W - width) * 0.5;
        const c = i % 2 === 0 ? mixHex("#6f4a4c", "#2e2230", twilight) : mixHex("#603f4a", "#241d2c", twilight);
        px(left, y, width, 2, c);
      }

      const vanishX = 122;
      const vanishY = 112;
      for (let i = 0; i < 10; i += 1) {
        const k = i / 9;
        const lx = 36 + k * 102;
        const rx = W - 36 - k * 70;
        const y0 = H;
        for (let s = 0; s <= 1; s += 1 / 24) {
          const y = y0 + (vanishY - y0) * s;
          const xL = lx + (vanishX - lx) * s;
          const xR = rx + (vanishX - rx) * s;
          px(xL, y, 1, 1, near);
          px(xR, y, 1, 1, near);
        }
      }
    }

    function drawCliff(twilight) {
      const top = mixHex("#3a3236", "#1b181f", twilight);
      const sideL = mixHex("#2a242a", "#15141a", twilight);
      const sideR = mixHex("#1f1c24", "#0f1118", twilight);

      const tipX = 338;
      const tipY = 171;

      for (let y = tipY; y < H; y += 1) {
        const t = (y - tipY) / (H - tipY);
        const halfL = 2 + t * 108;
        const halfR = 2 + t * 62;
        px(tipX - halfL, y, halfL, 1, sideL);
        px(tipX, y, halfR, 1, sideR);
      }

      px(tipX - 5, tipY - 1, 10, 3, top);
      for (let i = 0; i < 11; i += 1) {
        const y = tipY + 8 + i * 6;
        const cut = (i % 2) * 4;
        px(tipX - 16 - i * 4, y, 9 - cut, 1, "rgba(14,14,18,0.42)");
        px(tipX + 6 + i * 3, y + 2, 7 - cut, 1, "rgba(12,12,16,0.44)");
      }

      return { x: tipX, y: tipY };
    }

    function drawHeroBack(anchor, recoil, flash, t) {
      const bob = Math.sin(t * 0.006) * 0.8;
      const x = Math.round(anchor.x - recoil * 2);
      const y = Math.round(anchor.y + bob);
      const s = 2;

      px(x - 7 * s, y + 1 * s, 14 * s, 2 * s, "rgba(7,10,14,0.55)");
      px(x - 3 * s, y - 5 * s, 6 * s, 8 * s, "#3a4d72");
      px(x - 5 * s, y - 4 * s, 2 * s, 8 * s, "#b4434f");
      px(x + 3 * s, y - 3 * s, 2 * s, 6 * s, "#a03945");
      px(x - 3 * s, y - 10 * s, 6 * s, 4 * s, "#30201b");
      px(x - 2 * s, y - 9 * s, 4 * s, 2 * s, "#4a3026");
      px(x - 1 * s, y + 2 * s, 2 * s, 5 * s, "#26344e");

      // 枪口朝左上，不绘制弹道射线。
      px(x - 12 * s, y - 6 * s, 7 * s, 2 * s, "#1a2336");
      px(x - 14 * s, y - 7 * s, 2 * s, 4 * s, "#242f46");

      if (flash > 0) {
        const f = clamp(flash, 0, 1);
        px(x - 17 * s - f * 1.5, y - 7 * s, 3 + f * 2, 4, "#ffd58b");
        px(x - 20 * s - f * 2, y - 6 * s, 4 + f * 3, 2, "#fff2bf");
      }
    }

    function drawGlassCrack(progress) {
      if (progress <= 0) return;

      const p = clamp(progress, 0, 1);
      const crackP = clamp(p / 0.62, 0, 1);
      const seamP = clamp((p - 0.16) / 0.84, 0, 1);
      const mirrorP = clamp((p - 0.42) / 0.58, 0, 1);

      for (let i = 0; i < glassPattern.spokes.length; i += 1) {
        const spoke = glassPattern.spokes[i];
        drawPathProgress(spoke, crackP, "rgba(245,240,236,0.9)", 2);
        drawPathProgress(spoke, crackP, "rgba(156,118,118,0.62)", 1);
      }

      for (let i = 0; i < glassPattern.seams.length; i += 1) {
        drawPathProgress(glassPattern.seams[i], seamP, "rgba(232,226,226,0.7)", 1);
      }

      if (mirrorP > 0) {
        for (let i = 0; i < glassPattern.pieces.length; i += 1) {
          const piece = glassPattern.pieces[i];
          const tint = 0.04 + mirrorP * (0.06 + (i % 3) * 0.02);
          fillPolygon(piece, `rgba(210,220,240,${tint.toFixed(3)})`);
          strokePolygon(piece, `rgba(245,241,237,${(0.2 + mirrorP * 0.34).toFixed(3)})`, 1);
          drawShardReflection(piece, i, mirrorP);
        }
      }

      drawCircle(IMPACT_CENTER.x, IMPACT_CENTER.y, 2 + p * 2, `rgba(255,246,236,${(0.35 * p).toFixed(3)})`);
      px(0, 0, W, H, `rgba(228,236,255,${(0.012 + 0.02 * p).toFixed(3)})`);
    }

    function drawForegroundMask() {
      px(0, H - 20, W, 20, "rgba(6,9,14,0.55)");
      px(0, 0, W, 10, "rgba(7,8,13,0.45)");
      px(0, 0, 10, H, "rgba(7,8,13,0.38)");
      px(W - 10, 0, 10, H, "rgba(7,8,13,0.38)");

      for (let i = 0; i < 26; i += 1) {
        const x = (i * 19) % W;
        const h = 6 + (i % 5) * 3;
        px(x, H - h, 7, h, "rgba(7,9,13,0.72)");
      }
    }

    function drawCinematic(now) {
      const elapsed = (now - state.startAt) / 1000;

      if (elapsed > 1.0 && !state.shotAt) {
        state.shotAt = now;
        state.shakeUntil = now + 980;
      }

      if (state.shotAt) {
        state.twilight = clamp((now - state.shotAt) / 1900, 0, 1);
        state.crack = clamp((now - state.shotAt) / 900, 0, 1);
      }

      const shotElapsed = state.shotAt ? now - state.shotAt : -999;
      const flash = shotElapsed >= 0 && shotElapsed < 160 ? 1 - shotElapsed / 160 : 0;
      const recoil = shotElapsed >= 0 && shotElapsed < 220 ? 1 - shotElapsed / 220 : 0;

      drawSky(state.twilight);
      drawSunMoon(state.twilight, Math.sin(now * 0.008) * 0.5 + 0.5);
      drawPerspectiveValley(state.twilight);
      const cliffTip = drawCliff(state.twilight);
      drawHeroBack({ x: cliffTip.x - 12, y: cliffTip.y + 17 }, recoil, flash, now);
      drawGlassCrack(state.crack);
      drawForegroundMask();

      if (elapsed > 3.2 && state.phase === "cinematic") {
        state.phase = "ready";
        state.readyAt = now;
        hint.classList.add("show");
      }
    }

    function drawEnter(now) {
      drawCinematic(now);
      const k = clamp((now - state.enterAt) / 700, 0, 1);
      px(0, 0, W, H, `rgba(0,0,0,${k.toFixed(3)})`);
      if (k > 0.45) {
        const a = clamp((k - 0.45) / 0.55, 0, 1);
        ctx.fillStyle = `rgba(245,236,218,${a.toFixed(3)})`;
        ctx.font = "bold 15px 'Microsoft YaHei', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("游戏开始", W * 0.5, H * 0.52);
      }
      if (k >= 1) {
        state.phase = "started";
        tag.textContent = "已进入游戏（可接主场景）";
      }
    }

    function drawStarted(now) {
      drawSky(1);
      drawSunMoon(1, Math.sin(now * 0.01) * 0.5 + 0.5);
      drawPerspectiveValley(1);
      drawCliff(1);
      drawForegroundMask();

      ctx.fillStyle = "rgba(236,228,211,0.95)";
      ctx.font = "13px 'Microsoft YaHei', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("主场景已接管（示意）", W * 0.5, H - 18);
    }

    function loop(now) {
      ctx.save();
      ctx.clearRect(0, 0, W, H);

      if (state.shakeUntil > now && state.phase !== "started") {
        const q = clamp((state.shakeUntil - now) / 980, 0, 1);
        const amp = q * 7.4;
        const sx = (Math.random() * 2 - 1) * amp;
        const sy = (Math.random() * 2 - 1) * amp;
        ctx.translate(Math.round(sx), Math.round(sy));
      }

      if (state.phase === "cinematic" || state.phase === "ready") {
        drawCinematic(now);
      } else if (state.phase === "entering") {
        drawEnter(now);
      } else {
        drawStarted(now);
      }

      ctx.restore();

      if (state.phase === "ready") {
        const blink = Math.sin(now * 0.01) * 0.5 + 0.5;
        hint.style.opacity = (0.45 + blink * 0.55).toFixed(3);
      }

      requestAnimationFrame(loop);
    }

    viewport.addEventListener("pointermove", (e) => {
      const r = canvas.getBoundingClientRect();
      state.mouseX = ((e.clientX - r.left) / r.width) * W;
      state.mouseY = ((e.clientY - r.top) / r.height) * H;
    });

    viewport.addEventListener("pointerdown", () => {
      if (state.phase === "ready") {
        state.phase = "entering";
        state.enterAt = performance.now();
        hint.classList.remove("show");
      }
    });

    requestAnimationFrame(loop);
  </script>
</body>
</html>
